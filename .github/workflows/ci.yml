name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: backend

jobs:
  # ─── Backend: Code Style ────────────────────────────────────────────────────
  backend-lint:
    name: "PHP · Pint (code style)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run Pint (check mode)
        run: ./vendor/bin/pint --test

  # ─── Backend: Static Analysis ───────────────────────────────────────────────
  backend-static:
    name: "PHP · PHPStan + Deptrac"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run PHPStan (level 9)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Run Deptrac (DDD layer boundaries)
        run: ./vendor/bin/deptrac analyse --config-file=deptrac.yaml --no-progress

  # ─── Backend: Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: "PHP · PHPUnit"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: laravel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laravel -d laravel_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, pdo_sqlite, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --parallel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          QUEUE_CONNECTION: "null"

  # ─── Frontend: Lint ─────────────────────────────────────────────────────────
  frontend-lint:
    name: "Node · ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint resources/js --ext .ts,.vue

  # ─── Frontend: Build ────────────────────────────────────────────────────────
  frontend-build:
    name: "Node · Vite build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
